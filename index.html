function calcPts(s, cap) {
if (!s || s.dnp) return 0;
let p = 0;
const r = s.r||0, w = s.w||0;
// Batting: 1pt per run + milestone bonuses
p += r;
if (r >= 100) p += 50;
else if (r >= 50) p += 20;
if (s.duck) p -= 5;
// Bowling: 15pts per wicket + haul bonuses
p += w * 15;
if (w >= 5) p += 25;
else if (w >= 3) p += 10;
// Fielding: 5pts each
p += ((s.c||0)+(s.s||0))*5;
return cap ? p*2 : p;
}

function makeCode(n) {
return “BCC-”+n.toUpperCase().replace(/[^A-Z]/g,””).slice(0,3).padEnd(3,“X”)+”-”+Date.now().toString(36).toUpperCase().slice(-4);
}

function getErrors(sel) {
const rc = sel.reduce((a,p)=>({…a,[p.role]:(a[p.role]||0)+1}),{});
const tc = sel.reduce((a,p)=>({…a,[p.team]:(a[p.team]||0)+1}),{});
const e = [];
if (sel.length<11) e.push(“Select “+(11-sel.length)+” more”);
if ((rc.Keeper||0)!==1) e.push(“Need exactly 1 Keeper”);
if ((rc.Batter||0)<3) e.push(“Min 3 Batters (have “+(rc.Batter||0)+”)”);
if ((rc.Batter||0)>5) e.push(“Max 5 Batters”);
if ((rc.AR||0)<2) e.push(“Min 2 All-Rounders (have “+(rc.AR||0)+”)”);
if ((rc.AR||0)>3) e.push(“Max 3 All-Rounders”);
if ((rc.Bowler||0)<2) e.push(“Min 2 Bowlers (have “+(rc.Bowler||0)+”)”);
TEAMS.forEach(t => { if ((tc[t]||0)<2) e.push(“Min 2 from “+t); });
return e;
}

                  {["Player","Team","DNP","Runs","Duck","Wkts","Cats","Stmps"].map(function(h){return <th key={h} style={{padding:"7px 6px",color:"#999",fontWeight:700,textAlign:"left",fontSize:10.5,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>;})}
                </tr>
              </thead>
              <tbody>
                {PLAYERS.map(function(pl, i) {
                  const s = statsEntry[pl.id]||{};
                  const upd = function(f,v){setStatsEntry(function(prev){return {...prev,[pl.id]:{...(prev[pl.id]||{}),[f]:v}};});};
                  const is = {width:48,padding:"3px 5px",borderRadius:4,border:"1px solid #ddd",background:"#fff",color:"#1a1a1a",fontSize:12,fontFamily:"inherit"};
                  return (
                    <tr key={pl.id} style={{background:i%2===0?"#fff":"#f9f9f9",borderBottom:"1px solid #f0f0f0"}}>
                      <td style={{padding:"5px 6px",fontWeight:600,whiteSpace:"nowrap"}}>{pl.name}</td>
                      <td style={{padding:"5px 6px"}}><TB team={pl.team} /></td>
                      <td style={{padding:"5px 6px"}}><input type="checkbox" checked={!!s.dnp} onChange={function(e){upd("dnp",e.target.checked);}} /></td>
                      <td style={{padding:"4px 3px"}}><input type="number" min="0" value={s.r||""} onChange={function(e){upd("r",Number(e.target.value));}} disabled={s.dnp} style={is} /></td>
                      <td style={{padding:"5px 6px"}}><input type="checkbox" checked={!!s.duck} onChange={function(e){upd("duck",e.target.checked);}} disabled={s.dnp} /></td>
                      <td style={{padding:"4px 3px"}}><input type="number" min="0" value={s.w||""} onChange={function(e){upd("w",Number(e.target.value));}} disabled={s.dnp} style={is} /></td>
                      <td style={{padding:"4px 3px"}}><input type="number" min="0" value={s.c||""} onChange={function(e){upd("c",Number(e.target.value));}} disabled={s.dnp} style={is} /></td>
                      <td style={{padding:"4px 3px"}}><input type="number" min="0" value={s.s||""} onChange={function(e){upd("s",Number(e.target.value));}} disabled={s.dnp} style={is} /></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{marginTop:11,display:"flex",gap:7}}>
            <button onClick={function(){persist({...gs,stats:{...stats,[statsWk]:{...(stats[statsWk]||{}),...statsEntry}}});setStatsEntry({});alert("✅ GW"+statsWk+" saved!");}} style={{background:PUR,color:"#fff",border:"none",borderRadius:6,padding:"8px 14px",fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer"}}>{"Save GW"+statsWk}</button>
            <button onClick={function(){setStatsEntry({});}} style={{background:"#fff",color:PUR,border:"1.5px solid "+PUR,borderRadius:6,padding:"7px 13px",fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer"}}>Clear</button>
          </div>
        </div>
      )}

      {aTab==="addfx" && (
        <div>
          <div style={{background:"#fff",margin:"7px 8px 0",borderRadius:7,padding:14}}>
            <p style={{fontSize:10,fontWeight:700,color:"#999",textTransform:"uppercase",letterSpacing:.8,marginBottom:9}}>Add Fixture</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:7,marginBottom:8}}>
              {[["Home","home"],["Away *","away"],["Date *","date"],["Team","team"]].map(function(pair) {
                const lbl=pair[0], field=pair[1];
                return (
                  <div key={field}>
                    <p style={{fontSize:10,fontWeight:700,color:"#999",marginBottom:4}}>{lbl}</p>
                    {field==="team"
                      ? <select className="inp" value={newFx.team} onChange={function(e){setNewFx({...newFx,team:e.target.value});}} style={{padding:"8px 9px"}}>{TEAMS.map(function(t){return <option key={t}>{t}</option>;})}</select>
                      : <input type={field==="date"?"date":"text"} className="inp" value={newFx[field]} onChange={function(e){setNewFx({...newFx,[field]:e.target.value});}} placeholder={field==="away"?"Opponent":""} />
                    }
                  </div>
                );
              })}
            </div>
            <input className="inp" style={{marginBottom:8}} value={newFx.res} onChange={function(e){setNewFx({...newFx,res:e.target.value});}} placeholder="Result (optional)" />
            <button onClick={function(){if(!newFx.away||!newFx.date)return;persist({...gs,fx:[...fx,{...newFx,id:Date.now()}]});setNewFx({home:"Baildon CC",away:"",date:"",team:"1st XI",res:""}); }} style={{background:PUR,color:"#fff",border:"none",borderRadius:6,padding:"8px 14px",fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Add</button>
          </div>
          <div style={{background:"#fff",margin:"7px 8px",borderRadius:7,padding:14}}>
            <p style={{fontSize:10,fontWeight:700,color:"#999",textTransform:"uppercase",letterSpacing:.8,marginBottom:9}}>{"Existing ("+fx.length+")"}</p>
            {fx.map(function(f) {
              return (
                <div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #f5f5f5",padding:"8px 0",flexWrap:"wrap",gap:5}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                    <TB team={f.team} />
                    <span style={{fontWeight:600,fontSize:13}}>{f.home+" vs "+f.away}</span>
                    <span style={{color:"#aaa",fontSize:12}}>{new Date(f.date).toLocaleDateString("en-GB")}</span>
                    {f.res && <span style={{fontWeight:700,fontSize:12,color:f.res.startsWith("Won")?"#276749":"#c53030"}}>{f.res}</span>}
                  </div>
                  <button onClick={function(){persist({...gs,fx:fx.filter(function(x){return x.id!==f.id;})});}} style={{background:"none",border:"none",color:"#e53e3e",cursor:"pointer",fontSize:17}}>×</button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {aTab==="week" && (
        <div style={{background:"#fff",margin:"7px 8px",borderRadius:7,padding:14}}>
          <p style={{fontSize:10,fontWeight:700,color:"#999",textTransform:"uppercase",letterSpacing:.8,marginBottom:11}}>{"GW"+wk+" Summary"}</p>
          {subs.length===0 ? <p style={{color:"#aaa",fontSize:13}}>No entries yet.</p> : (
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:"#f7f7f7",borderBottom:"1px solid #eee"}}>
                  {["Manager","Team","GW Pts","Total"].map(function(h){return <th key={h} style={{padding:"7px 9px",color:"#999",fontWeight:700,textAlign:"left",fontSize:10.5,textTransform:"uppercase"}}>{h}</th>;})}
                </tr>
              </thead>
              <tbody>
                {sorted.map(function(sub) {
                  return (
                    <tr key={sub.code} style={{borderBottom:"1px solid #f5f5f5"}}>
                      <td style={{padding:"8px 9px",fontWeight:600}}>{sub.mgrName}</td>
                      <td style={{padding:"8px 9px",color:"#aaa",fontSize:12}}>{'"'+sub.teamName+'"'}</td>
                      <td style={{padding:"8px 9px",fontWeight:700,color:PUR,fontSize:16}}>{gwPts(sub,wk)}</td>
                      <td style={{padding:"8px 9px"}}><span className="ppill">{totalPts(sub)}</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      )}
    </div>
  )}
</div>
